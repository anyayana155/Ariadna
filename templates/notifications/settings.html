{% extends 'base.html' %}

{% block title %}Настройки уведомлений{% endblock %}

{% block content %}
<section class="form-page">
    <div class="form-card">
        <h1>Настройки уведомлений</h1>
        <p>Выбери, как получать новые сообщения, обновления заявок и системные уведомления.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Сохранить</button>
        </form>
    </div>
</section>
{% endblock %}
