{% extends 'base.html' %}

{% block title %}Настройки уведомлений{% endblock %}

{% block content %}
<section class="form-page">
    <div class="form-card">
        <h1>Настройки уведомлений</h1>
        <p>Выбери, как получать новые сообщения, обновления заявок и системные уведомления.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Сохранить</button>
        </form>

        <div style="margin-top: 20px;">
            <button type="button" class="btn btn-secondary" id="enable-push-btn">
                Включить push-уведомления на этом устройстве
            </button>
        </div>
    </div>
</section>

<script>
    const VAPID_PUBLIC_KEY = "{{ vapid_public_key|escapejs }}";
</script>
<script src="/static/js/push.js"></script>
{% endblock %}
