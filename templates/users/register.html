{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="form-page">
    <div class="form-card">
        <h1>Регистрация</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
        </form>
    </div>
    <p><a href="{% url 'login' %}">Уже есть аккаунт?</a></p>
</section>
{% endblock %}
